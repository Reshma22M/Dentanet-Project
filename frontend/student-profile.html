<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Profile - DentaNet</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/student-shell.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#6366f1",
            "primary-light": "#8B5CF6",
            "primary-dark": "#4C1D95",
            "background-light": "#F5F3FF",
            "background-dark": "#0F172A",
            "card-light": "#FFFFFF",
            "card-dark": "#1E293B",
            "sidebar-light": "#EDE9FE",
            "sidebar-dark": "#111827"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-white" data-student-page="profile">
  <div id="shell-header"></div>

  <div class="flex min-h-screen">
    <div id="shell-sidebar"></div>

    <main class="flex-1 p-6 md:p-10">
  <div class="max-w-4xl mx-auto">
    <div class="bg-white dark:bg-card-dark rounded-3xl shadow-sm border border-purple-100 dark:border-slate-800 overflow-hidden">

      <div class="px-8 py-8 border-b border-purple-100 dark:border-slate-800 bg-gradient-to-r from-indigo-600 to-violet-600 text-white">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
          <div>
            <p class="text-sm uppercase tracking-[0.2em] text-indigo-100 font-semibold mb-2">Student Account</p>
            <h1 class="text-3xl md:text-4xl font-extrabold">Student Profile</h1>
            <p class="mt-2 text-indigo-100">Review and update your profile details.</p>
          </div>

          <a href="student-dashboard.html" class="inline-flex items-center justify-center px-5 py-3 bg-white text-primary rounded-xl font-semibold shadow">
            Back to Dashboard
          </a>
        </div>
      </div>

      <div class="p-8 grid grid-cols-1 xl:grid-cols-3 gap-8">
        <aside class="xl:col-span-1">
          <div class="rounded-2xl border border-purple-100 dark:border-slate-700 bg-purple-50/60 dark:bg-slate-900/40 p-6 text-center">
            <img
              id="profilePreview"
              src="public/images/stu.jpg"
              alt="Student Profile"
              class="w-24 h-24 rounded-full object-cover border-4 border-white dark:border-slate-800 shadow mx-auto"
            />

            <h2 id="profileTitleName" class="mt-4 text-xl font-bold text-slate-900 dark:text-white">
              Student Name
            </h2>

            <p class="text-sm text-slate-500 dark:text-slate-400">Student</p>

            <div class="mt-6 space-y-3 text-sm text-left">
              <div class="flex justify-between gap-4 pb-3 border-b border-purple-100 dark:border-slate-700">
                <span class="text-slate-500 dark:text-slate-400">Email</span>
                <span id="summaryEmail" class="font-medium text-slate-900 dark:text-white text-right break-all">-</span>
              </div>

              <div class="flex justify-between gap-4 pb-3 border-b border-purple-100 dark:border-slate-700">
                <span class="text-slate-500 dark:text-slate-400">Registration No.</span>
                <span id="summaryRegNo" class="font-medium text-slate-900 dark:text-white text-right">-</span>
              </div>

              <div class="flex justify-between gap-4">
                <span class="text-slate-500 dark:text-slate-400">Department</span>
                <span id="summaryDepartment" class="font-medium text-slate-900 dark:text-white text-right">-</span>
              </div>
            </div>
          </div>
        </aside>

        <section class="xl:col-span-2">
          <div class="rounded-2xl border border-purple-100 dark:border-slate-700 bg-white dark:bg-card-dark shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-purple-100 dark:border-slate-700">
              <h2 class="text-xl font-bold text-slate-900 dark:text-white">Profile Details</h2>
              <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
                Keep your personal information current.
              </p>
            </div>

            <form id="studentProfileForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-5">
              <input type="hidden" id="profileUserId"/>

              <div>
                <label class="block text-sm font-semibold mb-2">First Name</label>
                <input id="firstName" type="text" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-white dark:bg-slate-900 dark:border-slate-700" required>
              </div>

              <div>
                <label class="block text-sm font-semibold mb-2">Last Name</label>
                <input id="lastName" type="text" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-white dark:bg-slate-900 dark:border-slate-700" required>
              </div>

              <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input id="email" type="email" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-slate-100 dark:bg-slate-800 dark:border-slate-700" readonly>
              </div>

              <div>
                <label class="block text-sm font-semibold mb-2">Registration Number</label>
                <input id="registrationNumber" type="text" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-slate-100 dark:bg-slate-800 dark:border-slate-700" readonly>
              </div>

              <div>
                <label class="block text-sm font-semibold mb-2">Department</label>
                <input id="departmentName" type="text" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-slate-100 dark:bg-slate-800 dark:border-slate-700" readonly>
              </div>

              <div class="md:col-span-2">
                <label class="block text-sm font-semibold mb-2">Profile Picture</label>
                <input id="profileImage" type="file" accept="image/*" class="w-full rounded-xl border border-slate-300 px-4 py-3 bg-white dark:bg-slate-900 dark:border-slate-700">
                <p class="text-xs text-slate-500 mt-2">
                  Accepted formats: JPG, PNG, WEBP. Maximum file size: 5 MB.
                </p>
              </div>

              <div class="md:col-span-2 flex items-center gap-3">
                <button id="saveBtn" type="submit" class="px-6 py-3 bg-primary text-white rounded-xl font-semibold">
                  Save Changes
                </button>
                <span id="profileStatus" class="text-sm"></span>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>
  </div>
    </main>
  </div>

  <div id="shell-footer"></div>

  <script>
    const DEFAULT_PROFILE_IMAGE = "public/images/stu.jpg";
    const FILE_BASE_URL = "http://localhost:3001";

    function setStatus(message, type = "default") {
      const statusEl = document.getElementById("profileStatus");
      statusEl.textContent = message;

      if (type === "error") {
        statusEl.className = "text-sm text-red-600";
      } else if (type === "success") {
        statusEl.className = "text-sm text-green-600";
      } else {
        statusEl.className = "text-sm text-slate-500";
      }
    }

    function buildImageUrl(imagePath) {
      if (!imagePath) return DEFAULT_PROFILE_IMAGE;
      if (imagePath.startsWith("http://") || imagePath.startsWith("https://")) return imagePath;
      if (imagePath.startsWith("/")) return `${FILE_BASE_URL}${imagePath}?t=${Date.now()}`;
      return imagePath;
    }

    function updateStudentUI(user) {
      const firstName = user.first_name || "";
      const lastName = user.last_name || "";
      const fullName = `${firstName} ${lastName}`.trim() || "Student";
      const imageUrl = buildImageUrl(user.profile_image_url);

      document.getElementById("profileUserId").value = user.id || "";
      document.getElementById("firstName").value = firstName;
      document.getElementById("lastName").value = lastName;
      document.getElementById("email").value = user.email || "";
      document.getElementById("registrationNumber").value = user.registration_number || "";
      document.getElementById("departmentName").value = user.department_name || "";

      document.getElementById("profileTitleName").textContent = fullName;
      document.getElementById("summaryEmail").textContent = user.email || "-";
      document.getElementById("summaryRegNo").textContent = user.registration_number || "-";
      document.getElementById("summaryDepartment").textContent = user.department_name || "-";
      document.getElementById("profilePreview").src = imageUrl;
    }

    async function loadStudentProfile() {
      const result = await API.users.getMe();

      if (!result.success || !result.user || result.user.account_type !== "student") {
        setStatus(result.error || "Failed to load profile.", "error");
        return null;
      }

      const user = result.user;
      updateStudentUI(user);

      localStorage.setItem("user", JSON.stringify({
        ...getCurrentUser(),
        ...user,
        firstName: user.first_name || "",
        lastName: user.last_name || "",
        profile_image_url: user.profile_image_url || null
      }));

      return user;
    }

    document.addEventListener("DOMContentLoaded", async function () {
      const authUser = await requireAuth("student");
      if (!authUser) return;

      await loadStudentProfile();

      document.getElementById("firstName").addEventListener("input", function () {
        const fullName = `${document.getElementById("firstName").value.trim()} ${document.getElementById("lastName").value.trim()}`.trim() || "Student";
        document.getElementById("profileTitleName").textContent = fullName;
      });

      document.getElementById("lastName").addEventListener("input", function () {
        const fullName = `${document.getElementById("firstName").value.trim()} ${document.getElementById("lastName").value.trim()}`.trim() || "Student";
        document.getElementById("profileTitleName").textContent = fullName;
      });

      document.getElementById("profileImage").addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          document.getElementById("profilePreview").src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    });

    document.getElementById("studentProfileForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const id = document.getElementById("profileUserId").value.trim();
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const imageFile = document.getElementById("profileImage").files[0];
      const saveBtn = document.getElementById("saveBtn");

      if (!id) {
        setStatus("Profile could not be loaded.", "error");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.classList.add("opacity-60", "cursor-not-allowed");
      setStatus("Saving changes...");

      try {
        const formData = new FormData();
        formData.append("first_name", firstName);
        formData.append("last_name", lastName);

        if (imageFile) {
          formData.append("profile_image", imageFile);
        }

        const result = await API.users.updateWithImage("student", id, formData);

        if (!result.success) {
          setStatus(result.error || "Failed to update profile.", "error");
          return;
        }

        const updatedUser = result.user || {};

        localStorage.setItem("user", JSON.stringify({
          ...getCurrentUser(),
          ...updatedUser,
          firstName: updatedUser.first_name || firstName,
          lastName: updatedUser.last_name || lastName,
          profile_image_url: updatedUser.profile_image_url || null
        }));

        updateStudentUI({
          ...updatedUser,
          first_name: updatedUser.first_name || firstName,
          last_name: updatedUser.last_name || lastName
        });

        document.getElementById("profileImage").value = "";
        setStatus("Profile updated successfully.", "success");
      } catch (error) {
        console.error("Student profile update error:", error);
        setStatus("An unexpected error occurred while updating the profile.", "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.classList.remove("opacity-60", "cursor-not-allowed");
      }
    });
  </script>
</body>
</html>
