<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Grades & Feedback - DentaNet LMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/student-shell.js"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#6366f1",
          "background-light": "#F5F3FF",
          "background-dark": "#0F172A",
          "card-dark": "#1E293B",
          "sidebar-light": "#EDE9FE",
          "sidebar-dark": "#111827",
        }
      }
    }
  };
</script>
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-background-light dark:bg-background-dark transition-colors duration-300" data-student-page="grades">
<div id="shell-header"></div>
<div class="flex min-h-screen">
  <div id="shell-sidebar"></div>
  <main class="flex-1 p-6 md:p-10">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-1">Grades & Feedback</h1>
        <p class="text-slate-500 dark:text-slate-400">Published AI and lecturer results will appear here.</p>
      </div>
    </div>

    <div id="alertBox" class="hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium"></div>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
      <div class="xl:col-span-8">
        <div id="resultsList" class="space-y-6">
          <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 text-sm text-slate-500 dark:text-slate-400">
            Loading published results...
          </div>
        </div>
      </div>

      <div class="xl:col-span-4 space-y-6">
        <div class="bg-indigo-600 rounded-3xl p-8 text-white shadow-xl shadow-indigo-100 dark:shadow-none h-fit">
          <div class="flex items-center gap-3 mb-6">
            <span class="material-icons-round p-2 bg-white/20 rounded-xl">insights</span>
            <h3 class="font-bold text-xl">Result Flow</h3>
          </div>
          <p class="text-indigo-100 leading-relaxed mb-4">
            Practice submissions are auto-published after AI evaluation. Exam submissions appear here after lecturer review and publishing.
          </p>
          <p id="resultSummary" class="text-sm text-indigo-50 font-semibold">
            Waiting to load your latest published results.
          </p>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="shell-footer"></div>

<script>
function showAlert(message, type = "error") {
  const box = document.getElementById("alertBox");
  box.classList.remove("hidden");
  box.className = type === "success"
    ? "mb-6 rounded-2xl px-4 py-3 text-sm font-medium bg-green-100 text-green-700 border border-green-200"
    : "mb-6 rounded-2xl px-4 py-3 text-sm font-medium bg-red-100 text-red-700 border border-red-200";
  box.textContent = message;
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatDate(value) {
  if (!value) return "-";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return date.toLocaleString();
}

function buildResultCard(item) {
  const grade = item.grade != null ? Number(item.grade).toFixed(2) : "-";
  const resultBadgeClass = item.passFail === "PASS"
    ? "bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400"
    : "bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400";

  return `
    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
      <div class="flex justify-between items-start mb-6 gap-4">
        <div>
          <p class="text-xs font-bold uppercase tracking-wider text-primary mb-2">${escapeHtml(item.kind)}</p>
          <h3 class="text-xl font-bold text-slate-900 dark:text-white">${escapeHtml(item.title)}</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Published on ${formatDate(item.publishedAt)}</p>
        </div>
        <div class="flex flex-col items-center">
          <span class="text-3xl font-black text-primary">${grade}</span>
          <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Grade</span>
        </div>
      </div>
      <div class="bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-5 mb-6">
        <h4 class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3 flex items-center gap-2">
          <span class="material-icons-round text-primary text-lg">comment</span>
          Feedback
        </h4>
        <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed italic">
          "${escapeHtml(item.feedback || 'No feedback provided.')}"
        </p>
      </div>
      <div class="flex items-center justify-between border-t border-slate-100 dark:border-slate-700 pt-4">
        <span class="text-xs text-slate-500 dark:text-slate-400">Submission ID <span class="font-semibold text-slate-700 dark:text-slate-200">${escapeHtml(item.submissionId)}</span></span>
        <span class="px-3 py-1 text-xs font-bold rounded-full uppercase ${resultBadgeClass}">${escapeHtml(item.passFail || "PENDING")}</span>
      </div>
    </div>
  `;
}

async function loadResults() {
  try {
    const token = localStorage.getItem("token");
    const response = await fetch("http://localhost:3001/api/submissions/student/dashboard-data", {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || "Failed to load results");
    }

    const practiceResults = (data.practiceSessions || [])
      .filter(item => item.submission_id && item.final_grade != null)
      .map(item => ({
        submissionId: item.submission_id,
        title: item.purpose || "Practice Session",
        kind: "Practice",
        grade: item.final_grade,
        feedback: item.final_feedback,
        passFail: item.pass_fail,
        publishedAt: item.submitted_at
      }));

    const examResults = (data.examSessions || [])
      .filter(item => item.submission_id && item.published_grade != null)
      .map(item => ({
        submissionId: item.submission_id,
        title: item.exam_name || "Exam Submission",
        kind: "Exam",
        grade: item.published_grade,
        feedback: item.final_feedback,
        passFail: item.pass_fail,
        publishedAt: item.submitted_at
      }));

    const results = [...examResults, ...practiceResults].sort((a, b) => {
      return new Date(b.publishedAt || 0) - new Date(a.publishedAt || 0);
    });

    const list = document.getElementById("resultsList");
    const summary = document.getElementById("resultSummary");

    if (!results.length) {
      list.innerHTML = `
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 text-sm text-slate-500 dark:text-slate-400">
          No published grades yet. Results will appear after AI publication for practice sessions or lecturer publication for exams.
        </div>
      `;
      summary.textContent = "No published results are available yet.";
      return;
    }

    list.innerHTML = results.map(buildResultCard).join("");
    summary.textContent = `${results.length} published result${results.length === 1 ? "" : "s"} available.`;
  } catch (error) {
    console.error(error);
    showAlert(error.message || "Failed to load grades and feedback");
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  const user = await requireAuth("student");
  if (!user) return;
  await loadResults();
});
</script>
</body>
</html>
