<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DentaNet | Submission Hub</title>
  <meta name="description" content="Submit your practical and examination work for the selected module on DentaNet LMS."/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/student-shell.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#6366f1",
            "primary-light": "#8B5CF6",
            "primary-dark": "#4C1D95",
            "background-light": "#F5F3FF",
            "background-dark": "#0F172A",
            "card-light": "#FFFFFF",
            "card-dark": "#1E293B",
            "sidebar-light": "#EDE9FE",
            "sidebar-dark": "#111827",
          },
          fontFamily: { display: ["Inter", "sans-serif"] },
          borderRadius: { DEFAULT: "0.75rem" },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }

    .tab-active {
      background: linear-gradient(135deg, #6366f1 0%, #8B5CF6 100%);
      color: white;
      box-shadow: 0 6px 18px rgba(99,102,241,0.30);
    }
    .tab-inactive {
      background: white;
      color: #475569;
      border: 1.5px solid #e2e8f0;
    }
    .dark .tab-inactive {
      background: #1e293b;
      color: #cbd5e1;
      border-color: #334155;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 3px 10px;
    }
    .status-approved  { background:#dcfce7; color:#166534; }
    .status-completed { background:#dbeafe; color:#1e40af; }
    .status-pending   { background:#fef9c3; color:#854d0e; }
    .status-denied    { background:#fee2e2; color:#991b1b; }
    .status-cancelled { background:#f3f4f6; color:#6b7280; }

    .result-pass { background:#dcfce7; color:#166534; }
    .result-fail { background:#fee2e2; color:#991b1b; }

    .card-hover {
      transition: box-shadow .2s, transform .2s;
    }
    .card-hover:hover {
      box-shadow: 0 10px 40px rgba(99,102,241,.12);
      transform: translateY(-2px);
    }

    .submit-btn {
      background: linear-gradient(135deg,#6366f1 0%,#8B5CF6 100%);
      box-shadow: 0 6px 20px rgba(99,102,241,.35);
      transition: opacity .2s, box-shadow .2s, transform .15s;
    }
    .submit-btn:hover { opacity:.92; transform:translateY(-1px); }
    .submit-btn:disabled { opacity:.6; transform:none; cursor:not-allowed; }

    .skeleton {
      animation: pulse 1.4s ease-in-out infinite;
      background: linear-gradient(90deg,#ede9fe 25%,#e0e7ff 50%,#ede9fe 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 12px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .module-badge {
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      color: white;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 3px 12px;
    }

    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn .35s ease both; }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark transition-colors duration-300" data-student-page="submission">

  <div id="shell-header"></div>

  <div class="flex min-h-screen">
    <div id="shell-sidebar"></div>

    <!-- MAIN -->
    <main class="flex-1 p-6 md:p-10">

      <!-- Header block -->
      <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-10 gap-6">
        <div>
          <!-- Back to module link -->
          <a id="backToModuleLink" href="student-module-details.html" class="inline-flex items-center gap-1 text-sm text-primary font-semibold mb-3 hover:underline">
            <span class="material-icons-round text-[16px]">arrow_back</span>
            Back to Module
          </a>

          <div class="flex items-center gap-3 flex-wrap mb-1">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Submission Hub</h1>
            <span id="moduleBadge" class="module-badge hidden">Loading…</span>
          </div>
          <p id="moduleSubtitle" class="text-gray-500 dark:text-gray-400 mt-1 max-w-2xl">
            Submit your practice and examination work for this module.
          </p>
        </div>

        <!-- Stats row -->
        <div class="flex gap-4 flex-wrap shrink-0">
          <div class="bg-white dark:bg-card-dark rounded-2xl border border-purple-50 dark:border-gray-800 px-5 py-3 shadow-sm text-center">
            <p class="text-2xl font-extrabold text-primary" id="statPractice">—</p>
            <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mt-0.5">Practice</p>
          </div>
          <div class="bg-white dark:bg-card-dark rounded-2xl border border-purple-50 dark:border-gray-800 px-5 py-3 shadow-sm text-center">
            <p class="text-2xl font-extrabold text-primary" id="statExam">—</p>
            <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mt-0.5">Exams</p>
          </div>
          <div class="bg-white dark:bg-card-dark rounded-2xl border border-purple-50 dark:border-gray-800 px-5 py-3 shadow-sm text-center">
            <p class="text-2xl font-extrabold text-green-500" id="statSubmitted">—</p>
            <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mt-0.5">Submitted</p>
          </div>
        </div>
      </div>

      <!-- Alert box -->
      <div id="alertBox" class="hidden mb-6 rounded-2xl px-4 py-3 text-sm font-medium"></div>

      <!-- Tabs -->
      <div class="bg-white dark:bg-card-dark rounded-2xl px-4 py-3 shadow-sm border border-purple-50 dark:border-gray-800 mb-8 flex flex-wrap gap-3">
        <button id="tabPractice" class="tab-button tab-active px-5 py-2.5 rounded-xl text-sm font-semibold" type="button" data-panel="practicePanel">
          <span class="material-icons-round text-[16px] align-middle mr-1">science</span>
          Practice Sessions
        </button>
        <button id="tabExam" class="tab-button tab-inactive px-5 py-2.5 rounded-xl text-sm font-semibold" type="button" data-panel="examPanel">
          <span class="material-icons-round text-[16px] align-middle mr-1">fact_check</span>
          Practical Examinations
        </button>
      </div>

      <!-- Practice Panel -->
      <section id="practicePanel" class="tab-panel fade-in">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-lg font-bold text-gray-900 dark:text-white">Practice Sessions</h2>
          <span id="practiceCountBadge" class="text-xs text-primary font-bold"></span>
        </div>
        <div id="practiceContainer" class="space-y-4">
          <!-- Skeleton -->
          <div class="skeleton h-24 w-full opacity-50"></div>
          <div class="skeleton h-24 w-full opacity-40"></div>
        </div>
      </section>

      <!-- Exam Panel -->
      <section id="examPanel" class="tab-panel hidden fade-in">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-lg font-bold text-gray-900 dark:text-white">Practical Examinations</h2>
          <span id="examCountBadge" class="text-xs text-primary font-bold"></span>
        </div>
        <div id="examContainer" class="space-y-4">
          <!-- Skeleton -->
          <div class="skeleton h-24 w-full opacity-50"></div>
          <div class="skeleton h-24 w-full opacity-40"></div>
        </div>
      </section>

    </main>
  </div>

  <div id="shell-footer"></div>

<script>
const API_BASE = 'http://localhost:3001';

// ── URL params ──────────────────────────────────────────
const urlParams   = new URLSearchParams(window.location.search);
const moduleId    = urlParams.get('module_id');
const focusExamId = urlParams.get('exam_id');   // highlight a specific exam if coming from module details

// ── Helpers ─────────────────────────────────────────────
function esc(v) {
  return String(v ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '—';
  return dt.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}

function fmtTime(t) {
  if (!t) return '—';
  const [h, m] = String(t).split(':');
  const hr = parseInt(h, 10);
  return `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
}

function statusPill(status) {
  const map = {
    APPROVED:'status-approved',
    COMPLETED:'status-completed',
    PENDING:'status-pending',
    DENIED:'status-denied',
    CANCELLED:'status-cancelled'
  };
  const cls = map[status] || 'status-pending';
  return `<span class="status-pill ${cls}">${esc(status)}</span>`;
}

function resultPill(passFail) {
  if (!passFail) return '<span class="status-pill status-pending">Pending</span>';
  const cls = passFail === 'PASS' ? 'result-pass' : 'result-fail';
  return `<span class="status-pill ${cls}">${esc(passFail)}</span>`;
}

function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.classList.remove('hidden');
  box.className = type === 'success'
    ? 'mb-6 rounded-2xl px-4 py-3 text-sm font-medium bg-green-100 text-green-700 border border-green-200'
    : 'mb-6 rounded-2xl px-4 py-3 text-sm font-medium bg-red-100 text-red-700 border border-red-200';
  box.textContent = msg;
}

// ── Tab switching ────────────────────────────────────────
function setupTabs() {
  const buttons = document.querySelectorAll('.tab-button');
  const panels  = document.querySelectorAll('.tab-panel');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.getAttribute('data-panel');

      buttons.forEach(b => {
        b.classList.remove('tab-active');
        b.classList.add('tab-inactive');
      });
      panels.forEach(p => p.classList.add('hidden'));

      btn.classList.remove('tab-inactive');
      btn.classList.add('tab-active');

      const target = document.getElementById(targetId);
      if (target) {
        target.classList.remove('hidden');
        target.classList.add('fade-in');
      }
    });
  });
}

// ── Submission card builders ─────────────────────────────

function buildPracticeCard(session) {
  const allowed = ['APPROVED','COMPLETED'].includes(session.slot_status);
  const hasSubmission = !!session.submission_id;

  // Submission link – carry module_id through
  const subLink = `practical-exam-submission.html?request_id=${session.request_id}${moduleId ? '&module_id=' + encodeURIComponent(moduleId) : ''}`;

  const aiScore = session.api_score != null
    ? `<span class="ml-2 text-xs font-bold text-primary">AI Score: ${session.api_score}</span>`
    : '';

  return `
  <article class="card-hover bg-white dark:bg-card-dark rounded-2xl border border-purple-50 dark:border-gray-800 p-5 shadow-sm flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-2 mb-1">
        <span class="material-icons-round text-primary text-[20px]">science</span>
        <h3 class="font-bold text-gray-900 dark:text-white text-base truncate">
          ${esc(session.purpose || 'Practice Session')}
        </h3>
        ${statusPill(session.slot_status)}
      </div>

      <p class="text-xs text-primary font-semibold mt-1">
        ${fmtDate(session.booking_date)} &nbsp;•&nbsp; ${fmtTime(session.start_time)} – ${fmtTime(session.end_time)}
      </p>

      <div class="flex flex-wrap items-center gap-3 mt-2">
        ${hasSubmission
          ? `<span class="text-xs text-gray-500 dark:text-gray-400">
               Attempt <strong>${esc(session.attempt_number)}</strong> submitted on ${fmtDate(session.submitted_at)}
             </span>
             ${resultPill(session.pass_fail)}
             ${aiScore}`
          : `<span class="text-xs text-gray-400 italic">No submission yet</span>`
        }
      </div>
    </div>

    <div class="shrink-0 flex flex-col gap-2 items-end">
      ${allowed
        ? `<a href="${subLink}"
             class="submit-btn inline-flex items-center gap-2 px-5 py-2.5 text-white rounded-xl text-sm font-bold">
             <span class="material-icons-round text-[18px]">upload_file</span>
             ${hasSubmission ? 'Resubmit' : 'Submit Now'}
           </a>`
        : `<span class="text-xs text-gray-400 font-semibold bg-gray-100 dark:bg-gray-800 rounded-xl px-4 py-2">
             <span class="material-icons-round text-[14px] align-middle mr-1">lock</span>Locked
           </span>`
      }
    </div>
  </article>
  `;
}

function buildExamCard(exam) {
  const allowed = ['APPROVED','COMPLETED'].includes(exam.slot_status);
  const hasSubmission = !!exam.submission_id;
  const isHighlighted = focusExamId && String(exam.exam_id) === String(focusExamId);

  // Submission link – carry module_id through
  const subLink = `practical-exam-submission.html?exam_id=${exam.exam_id}${moduleId ? '&module_id=' + encodeURIComponent(moduleId) : ''}`;

  const gradeinfo = exam.published_grade != null
    ? `<span class="ml-2 text-xs font-bold text-primary">Grade: ${exam.published_grade}%</span>`
    : '';

  return `
  <article class="card-hover bg-white dark:bg-card-dark rounded-2xl border ${isHighlighted ? 'border-primary border-2' : 'border-purple-50 dark:border-gray-800'} p-5 shadow-sm flex flex-col md:flex-row md:items-center md:justify-between gap-4 ${isHighlighted ? 'ring-2 ring-primary/20' : ''}">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-2 mb-1">
        <span class="material-icons-round text-primary text-[20px]">fact_check</span>
        <h3 class="font-bold text-gray-900 dark:text-white text-base truncate">
          ${esc(exam.exam_name || 'Practical Exam')}
        </h3>
        ${statusPill(exam.slot_status)}
        ${isHighlighted ? '<span class="status-pill status-approved">Selected</span>' : ''}
      </div>

      ${exam.description ? `<p class="text-sm text-gray-500 dark:text-gray-400 mt-1 mb-1 line-clamp-1">${esc(exam.description)}</p>` : ''}

      <p class="text-xs text-primary font-semibold">
        ${fmtDate(exam.slot_date)} &nbsp;•&nbsp; ${fmtTime(exam.exam_start_time)} – ${fmtTime(exam.exam_end_time)}
      </p>

      <div class="flex flex-wrap items-center gap-3 mt-2">
        ${hasSubmission
          ? `<span class="text-xs text-gray-500 dark:text-gray-400">
               Attempt <strong>${esc(exam.attempt_number)}</strong> submitted on ${fmtDate(exam.submitted_at)}
             </span>
             ${resultPill(exam.pass_fail)}
             ${gradeinfo}`
          : `<span class="text-xs text-gray-400 italic">No submission yet</span>`
        }
      </div>
    </div>

    <div class="shrink-0 flex flex-col gap-2 items-end">
      ${allowed
        ? `<a href="${subLink}"
             class="submit-btn inline-flex items-center gap-2 px-5 py-2.5 text-white rounded-xl text-sm font-bold">
             <span class="material-icons-round text-[18px]">upload_file</span>
             ${hasSubmission ? 'Resubmit' : 'Submit Now'}
           </a>`
        : `<span class="text-xs text-gray-400 font-semibold bg-gray-100 dark:bg-gray-800 rounded-xl px-4 py-2">
             <span class="material-icons-round text-[14px] align-middle mr-1">lock</span>
             ${exam.slot_status === 'PENDING' ? 'Awaiting Approval' : 'Locked'}
           </span>`
      }
    </div>
  </article>
  `;
}

function emptyState(icon, message) {
  return `
  <div class="bg-white dark:bg-card-dark rounded-2xl border border-purple-50 dark:border-gray-800 p-10 flex flex-col items-center text-center shadow-sm">
    <span class="material-icons-round text-primary/30 text-5xl mb-4">${icon}</span>
    <p class="text-gray-400 dark:text-gray-500 text-sm font-medium">${message}</p>
  </div>`;
}

// ── Render functions ─────────────────────────────────────

function renderPractice(sessions) {
  const container = document.getElementById('practiceContainer');
  const badge     = document.getElementById('practiceCountBadge');
  badge.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;

  if (!sessions.length) {
    container.innerHTML = emptyState('science', 'No practice sessions found for this module.');
    return;
  }
  container.innerHTML = sessions.map(buildPracticeCard).join('');
  document.getElementById('statPractice').textContent = sessions.length;
}

function renderExams(exams) {
  const container = document.getElementById('examContainer');
  const badge     = document.getElementById('examCountBadge');
  badge.textContent = `${exams.length} exam${exams.length !== 1 ? 's' : ''}`;

  if (!exams.length) {
    container.innerHTML = emptyState('fact_check', 'No examination slots booked for this module.');
    return;
  }
  container.innerHTML = exams.map(buildExamCard).join('');
  document.getElementById('statExam').textContent = exams.length;

  // If a specific exam was requested, switch to exam tab automatically
  if (focusExamId) {
    document.getElementById('tabExam').click();
  }
}

// ── Load data ─────────────────────────────────────────────

async function load() {
  try {
    const token = localStorage.getItem('token');
    if (!token) { showAlert('Not logged in'); return; }

    let endpoint;
    if (moduleId) {
      endpoint = `${API_BASE}/api/submissions/student/module/${encodeURIComponent(moduleId)}`;
    } else {
      // Fallback – generic hub (all modules)
      endpoint = `${API_BASE}/api/submissions/student/dashboard-data`;
    }

    const res  = await fetch(endpoint, { headers:{ Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load');

    // Module badge & subtitle
    if (data.module) {
      const badge = document.getElementById('moduleBadge');
      badge.textContent = `${data.module.module_code} – ${data.module.module_name}`;
      badge.classList.remove('hidden');
      document.getElementById('moduleSubtitle').textContent =
        data.module.description || 'Submit your practical and examination work for this module.';

      // Update sidebar links to keep module context
      if (moduleId) {
        document.getElementById('sidebarBookingLink').href =
          `lab-slot-booking.html?module_id=${encodeURIComponent(moduleId)}`;
        document.getElementById('sidebarMaterialsLink').href =
          `study-materials.html?module_id=${encodeURIComponent(moduleId)}`;
        document.getElementById('backToModuleLink').href =
          `student-module-details.html?module_id=${encodeURIComponent(moduleId)}`;
      }
    }

    const practices = Array.isArray(data.practiceSessions) ? data.practiceSessions : [];
    const exams     = Array.isArray(data.examSessions)     ? data.examSessions     : [];

    renderPractice(practices);
    renderExams(exams);

    // Submitted count
    const submitted = [
      ...practices.filter(p => p.submission_id),
      ...exams.filter(e => e.submission_id)
    ].length;
    document.getElementById('statSubmitted').textContent = submitted;

  } catch (err) {
    console.error(err);
    showAlert(err.message || 'Failed to load submission data');
    document.getElementById('practiceContainer').innerHTML =
      emptyState('error_outline', 'Could not load practice sessions.');
    document.getElementById('examContainer').innerHTML =
      emptyState('error_outline', 'Could not load examination sessions.');
  }
}

// ── Init ──────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async function () {
  if (typeof requireAuth !== 'function') {
    alert('api.js failed to load');
    return;
  }

  const user = await requireAuth('student');
  if (!user) return;

  // Profile
  const fullName = user.fullName ||
    `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'Student';
  const nameEl = document.getElementById('studentProfileName');
  if (nameEl) nameEl.textContent = fullName;
  if (user.profile_image_url) {
    const img = document.getElementById('studentProfileImage');
    if (img) img.src = `http://localhost:3001${user.profile_image_url}?t=${Date.now()}`;
  }

  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) logoutBtn.onclick = () => API.auth.logout();

  setupTabs();
  await load();
});
</script>
</body>
</html>
