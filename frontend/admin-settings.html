<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Settings - DentaNet</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="assets/css/common.css" rel="stylesheet"/>
<script src="assets/js/common.js"></script>
<script src="assets/js/api.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#1E3A8A",
        accent: "#3B82F6",
        "bg-main": "#F1F5F9"
      },
      fontFamily: {
        sans: ["Inter", "sans-serif"]
      }
    }
  }
};
</script>
<style type="text/tailwindcss">
@layer base {
  body { @apply font-sans; }
}
.sidebar-link { @apply flex items-center gap-3 p-3 rounded-lg hover:bg-white/10 transition-colors; }
.sidebar-active { @apply bg-accent text-white font-semibold shadow-sm; }
.panel { @apply bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm; }
</style>
</head>
<body class="bg-bg-main dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen transition-colors duration-200">
<header class="fixed top-0 left-0 right-0 h-16 bg-indigo-50 dark:bg-slate-900 border-b border-indigo-100 dark:border-slate-800 z-50">
  <div class="h-full flex items-center justify-between px-4 lg:px-8">
    <div class="flex items-center gap-3">
      <img src="blue-logo.svg" alt="DentaNet Logo" class="h-20 w-auto object-contain"/>
    </div>
    <div class="hidden md:flex items-center gap-8">
      <button onclick="toggleDarkMode && toggleDarkMode()" class="p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:shadow-sm transition-all">
        <span class="material-symbols-outlined dark:hidden">dark_mode</span>
        <span class="material-symbols-outlined hidden dark:block text-yellow-400">light_mode</span>
      </button>
      <button id="logoutBtn" class="bg-primary hover:bg-accent text-white px-5 py-2 rounded-xl text-sm font-semibold transition-all shadow-md">Log Out</button>
    </div>
  </div>
</header>

<aside class="w-72 bg-[#172554] p-6 rounded-2xl text-white flex flex-col justify-between shadow-xl border fixed top-20 bottom-6 left-6 hidden lg:flex z-40">
  <div>
    <div class="mb-8">
      <h2 class="text-lg font-bold">LMS</h2>
      <p class="text-xs opacity-70">University of Peradeniya</p>
    </div>
    <nav class="space-y-2">
      <a class="sidebar-link" href="admin-dashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
      <a class="sidebar-link" href="Admin-labslot-timetable.html"><span class="material-symbols-outlined">event_note</span><span>Lab Timetable</span></a>
      <a class="sidebar-link" href="admin-manage-users.html"><span class="material-symbols-outlined">group</span><span>Manage Users</span></a>
      <a class="sidebar-link" href="admin-modules.html"><span class="material-symbols-outlined">menu_book</span><span>Modules</span></a>
      <a class="sidebar-link" href="master-schedule.html"><span class="material-symbols-outlined">list_alt</span><span>Calendar</span></a>
      <a class="sidebar-link" href="admin-api-monitor.html"><span class="material-symbols-outlined">monitoring</span><span>API Monitor</span></a>
      <a class="sidebar-active sidebar-link" href="admin-settings.html"><span class="material-symbols-outlined">settings</span><span>Settings</span></a>
    </nav>
  </div>
</aside>

<div class="pt-16 lg:pl-72 min-h-screen flex flex-col">
  <main class="flex-1 px-4 md:px-8 xl:px-10 py-8">
    <div class="max-w-6xl mx-auto space-y-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white">System Settings</h1>
          <p class="text-slate-500 dark:text-slate-400 mt-1">Manage key platform preferences from one place.</p>
        </div>
        <button class="px-5 py-2.5 rounded-xl bg-primary text-white hover:bg-accent text-sm font-semibold">Save Changes</button>
      </div>

      <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="panel p-5 space-y-4">
          <h2 class="font-bold text-slate-900 dark:text-white">General</h2>
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">System Name</label>
            <input type="text" value="DentaNet Academic LMS" class="w-full rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-4 py-2.5 text-sm"/>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">Timezone</label>
            <select class="w-full rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-4 py-2.5 text-sm">
              <option>UTC +05:30 (Colombo)</option>
              <option>UTC +00:00 (GMT)</option>
            </select>
          </div>
        </div>

        <div class="panel p-5 space-y-4">
          <h2 class="font-bold text-slate-900 dark:text-white">Notifications</h2>
          <label class="flex items-center justify-between text-sm">
            <span>Email Alerts</span>
            <input type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary"/>
          </label>
          <label class="flex items-center justify-between text-sm">
            <span>Slot Request Alerts</span>
            <input type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary"/>
          </label>
          <label class="flex items-center justify-between text-sm">
            <span>Practice Session Alerts</span>
            <input type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary"/>
          </label>
        </div>
      </section>
    </div>
  </main>

  <footer class="border-t border-slate-200 dark:border-slate-800 px-4 md:px-8 xl:px-10 py-8 text-center text-xs text-slate-500 dark:text-slate-400">
    © 2026 DentaNet Admin Hub.
  </footer>
</div>

<script>
document.addEventListener("DOMContentLoaded", async function () {
  const admin = await requireAuth("admin");
  if (!admin) return;
  const logoutBtn = document.getElementById("logoutBtn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", function () {
      API.auth.logout();
    });
  }
});
</script>
</body>
</html>
