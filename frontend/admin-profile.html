<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Profile - DentaNet</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/js/api.js"></script>

<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#1E3A8A",
        accent: "#3B82F6",
        "bg-main": "#F1F5F9",
        "bg-sidebar": "#0F172A"
      }
    }
  }
};
</script>

</head>

<body class="bg-bg-main dark:bg-slate-900 text-slate-800 dark:text-slate-200">

<!-- TOP NAV -->
<nav class="bg-indigo-50 dark:bg-slate-900 border-b border-indigo-100 dark:border-slate-800 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">

    <img src="blue-logo.svg" class="h-24"/>

    <button id="logoutBtn"
      class="bg-primary hover:bg-accent text-white px-5 py-2 rounded-lg text-sm font-semibold">
      Log Out
    </button>

  </div>
</nav>

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-72 bg-bg-sidebar p-6 text-slate-300 hidden lg:flex flex-col">

  <nav class="space-y-2">

    <a href="admin-dashboard.html"
      class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/10">
      <span class="material-symbols-outlined">dashboard</span>
      Dashboard
    </a>

    <a href="admin-manage-users.html"
      class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/10">
      <span class="material-symbols-outlined">group</span>
      Manage Users
    </a>

    <a href="admin-profile.html"
      class="flex items-center gap-3 p-3 rounded-lg bg-primary text-white">
      <span class="material-symbols-outlined">person</span>
      My Profile
    </a>

  </nav>

</aside>

<!-- MAIN -->
<main class="flex-1 p-6 md:p-10">

<div class="max-w-4xl mx-auto space-y-8">

<!-- HEADER -->
<div>
  <h1 class="text-3xl font-extrabold">Admin Profile</h1>
  <p class="text-slate-500">Update your account information</p>
</div>

<!-- PROFILE CARD -->
<div class="bg-white dark:bg-slate-800 rounded-2xl border p-6 shadow-sm">

<form id="adminProfileForm"
  class="grid grid-cols-1 md:grid-cols-2 gap-5">

<input type="hidden" id="adminId"/>

<!-- FIRST NAME -->
<div>
<label class="block text-sm font-semibold mb-2">
First Name
</label>

<input id="firstName"
  type="text"
  class="w-full border rounded-xl px-4 py-3"
  required>
</div>

<!-- LAST NAME -->
<div>
<label class="block text-sm font-semibold mb-2">
Last Name
</label>

<input id="lastName"
  type="text"
  class="w-full border rounded-xl px-4 py-3"
  required>
</div>

<!-- EMAIL -->
<div class="md:col-span-2">

<label class="block text-sm font-semibold mb-2">
Email
</label>

<input id="email"
  type="email"
  class="w-full border rounded-xl px-4 py-3 bg-slate-100"
  readonly>

</div>

<!-- PROFILE IMAGE -->
<div class="md:col-span-2">

<label class="block text-sm font-semibold mb-2">
Profile Picture
</label>

<input type="file"
  id="profileImage"
  accept="image/*"
  class="w-full border rounded-xl px-4 py-3">

</div>

<!-- BUTTON -->
<div class="md:col-span-2 flex items-center gap-3">

<button type="submit"
  class="bg-primary text-white px-6 py-3 rounded-xl font-semibold">

Save Changes

</button>

<span id="statusMsg"
  class="text-sm"></span>

</div>

</form>

</div>

</div>

</main>

</div>

<!-- SCRIPT -->
<script>

document.addEventListener("DOMContentLoaded", async () => {

  const admin = await requireAuth("admin");
  if (!admin) return;

  document.getElementById("adminId").value =
    admin.id || "";

  document.getElementById("firstName").value =
    admin.firstName || "";

  document.getElementById("lastName").value =
    admin.lastName || "";

  document.getElementById("email").value =
    admin.email || "";

  document
    .getElementById("logoutBtn")
    .addEventListener("click", () => {
      API.auth.logout();
    });

});


/* UPDATE PROFILE */

document
.getElementById("adminProfileForm")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  const id =
    document.getElementById("adminId").value;

  const firstName =
    document.getElementById("firstName").value;

  const lastName =
    document.getElementById("lastName").value;

  const status =
    document.getElementById("statusMsg");

  status.textContent = "Saving...";

  const result =
    await API.users.update(id,{
      firstName,
      lastName
    });

  if (!result.ok){

    status.textContent =
      result.error || "Update failed";

    status.className =
      "text-red-600 text-sm";

    return;

  }

  status.textContent =
    "Profile updated successfully";

  status.className =
    "text-green-600 text-sm";

});

</script>

</body>
</html>
