<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Study Materials - DentaNet LMS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/student-shell.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#6366f1",
            "primary-light": "#8B5CF6",
            "primary-dark": "#4C1D95",
            "background-light": "#F5F3FF",
            "background-dark": "#0F172A",
            "card-light": "#FFFFFF",
            "card-dark": "#1E293B",
            "sidebar-light": "#EDE9FE",
            "sidebar-dark": "#111827",
          },
          fontFamily: { display: ["Inter", "sans-serif"] },
          borderRadius: { DEFAULT: "0.75rem" },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark transition-colors duration-300" data-student-page="materials">
  <div id="shell-header"></div>

  <div class="flex min-h-screen">
    <div id="shell-sidebar"></div>

    <main class="flex-1 p-6 md:p-10">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
          <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-1">Study Materials</h1>
          <p class="text-slate-500 dark:text-slate-400">Resources and guides for your clinical practice.</p>
        </div>

        <div class="w-full md:w-[360px]">
          <label class="relative block">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">
              search
            </span>
            <input
              id="searchInput"
              type="text"
              placeholder="Search resources..."
              class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
            />
          </label>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="flex flex-col md:flex-row md:items-center gap-3 mb-8">
        <select
          id="moduleFilter"
          class="px-4 py-2.5 rounded-xl text-sm font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300"
        >
          <option value="">All Modules</option>
        </select>

        <select
          id="typeFilter"
          class="px-4 py-2.5 rounded-xl text-sm font-medium bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300"
        >
          <option value="">All Types</option>
        </select>

        <button
          id="refreshBtn"
          class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-primary text-white shadow-sm hover:opacity-90 transition-all"
        >
          Refresh
        </button>

        <button
          id="shareMaterialBtn"
          class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-green-600 text-white shadow-sm hover:bg-green-700 transition-all flex items-center gap-2"
        >
          <span class="material-symbols-outlined text-[18px]">add_circle</span>
          Share Material
        </button>
      </div>

      <div id="pageStatus" class="hidden mb-6 rounded-xl px-4 py-3 text-sm font-medium"></div>

      <div id="materialsLoading" class="hidden text-sm text-slate-500 dark:text-slate-400 mb-6">
        Loading materials...
      </div>

      <div id="materialsContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
    </main>
  </div>

  <!-- SHARE MATERIAL MODAL -->
  <div id="shareModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-200 dark:border-slate-700 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
      <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-1">Share a Study Material</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">Upload a file or share a link with your classmates.</p>

      <div id="shareAlertBox" class="hidden mb-4 rounded-xl px-4 py-2.5 text-sm font-medium"></div>

      <!-- Title -->
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Title *</label>
      <input id="shareTitle" type="text" placeholder="e.g. Cavity Prep Notes"
        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-4 text-sm mb-4 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none" />

      <!-- Description -->
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Description</label>
      <textarea id="shareDescription" rows="2" placeholder="Optional description"
        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-4 text-sm mb-4 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none resize-none"></textarea>

      <!-- Module -->
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Module *</label>
      <select id="shareModule"
        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-4 text-sm mb-4 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none">
        <option value="">Select a module</option>
      </select>

      <!-- Type -->
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Material Type *</label>
      <select id="shareType"
        class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-4 text-sm mb-4 focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none">
        <option value="">Select a type</option>
      </select>

      <!-- File upload (shown for file-based types) -->
      <div id="shareFileGroup" class="mb-4">
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Upload File</label>
        <input id="shareFile" type="file" accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png,.mp4,.webm"
          class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-primary file:text-white file:font-semibold file:cursor-pointer" />
      </div>

      <!-- External URL (shown for link-based types) -->
      <div id="shareLinkGroup" class="mb-4 hidden">
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">External URL</label>
        <input id="shareUrl" type="url" placeholder="https://youtube.com/watch?v=..."
          class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2.5 px-4 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none" />
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <button id="shareCancelBtn" type="button" class="px-5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 text-sm font-bold hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">Cancel</button>
        <button id="shareSubmitBtn" type="button" class="px-6 py-2.5 rounded-xl bg-green-600 text-white text-sm font-bold hover:bg-green-700 transition-all shadow-md">Upload</button>
      </div>
    </div>
  </div>

  <div id="shell-footer"></div>

  <script>
    let allMaterials = [];
    let allModules = [];
    let allTypes = [];
    let backendBaseUrl = "";
    let currentModuleId = "";

function getModuleIdFromQuery() {
  const params = new URLSearchParams(window.location.search);
  return (
    params.get("module_id") ||
    sessionStorage.getItem("selectedStudentModuleId") ||
    sessionStorage.getItem("selectedModuleId") ||
    ""
  );
}


    function initBackendBaseUrl() {
      backendBaseUrl = typeof API_BASE_URL === "string"
        ? API_BASE_URL.replace(/\/api\/?$/, "")
        : "http://localhost:3001";
    }

    function showPageStatus(message, type = "error") {
      if (type === "success" && typeof showSuccessNotification === "function") {
        showSuccessNotification(message);
      } else if (typeof showErrorNotification === "function") {
        showErrorNotification(message);
      }

      const box = document.getElementById("pageStatus");
      box.textContent = message;
      box.classList.remove(
        "hidden",
        "bg-green-100", "text-green-700", "border-green-200",
        "bg-red-100", "text-red-700", "border-red-200"
      );
      box.classList.add("border");

      if (type === "success") {
        box.classList.add("bg-green-100", "text-green-700", "border-green-200");
      } else {
        box.classList.add("bg-red-100", "text-red-700", "border-red-200");
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getMaterialIcon(material) {
      const type = String(material.material_type_name || "").toLowerCase();

      if (type === "youtube") return "smart_display";
      if (type === "video") return "play_circle";
      if (type === "pdf") return "picture_as_pdf";
      if (type === "document") return "description";
      if (material.external_url) return "link";
      if (material.file_url) return "description";
      return "menu_book";
    }

    function getMaterialUrl(material) {
      if (material.external_url) return material.external_url;
      if (material.file_url) return `${backendBaseUrl}${material.file_url}`;
      return "#";
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString();
    }

    function createMaterialCard(material) {
      const icon = getMaterialIcon(material);
      const link = getMaterialUrl(material);

      return `
        <article class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden hover:shadow-md transition-shadow">
          <div class="aspect-video bg-slate-50 dark:bg-slate-900/50 flex items-center justify-center">
            <span class="material-symbols-outlined text-primary/30 text-7xl">${icon}</span>
          </div>

          <div class="p-6">
            <div class="flex items-start justify-between gap-3 mb-3">
              <h3 class="text-lg font-bold text-slate-900 dark:text-white leading-snug">
                ${escapeHtml(material.title || "Untitled Material")}
              </h3>
              <span class="material-symbols-outlined text-primary">${icon}</span>
            </div>

            <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">
              ${escapeHtml(material.module_name || "No module")} • ${escapeHtml(material.material_type_name || "Unknown type")}
            </p>

            <div class="flex items-center justify-between text-xs text-slate-500 dark:text-slate-400 border-t border-slate-100 dark:border-slate-700 pt-4">
              <span class="font-semibold">${formatDate(material.created_at) || "Available now"}</span>
              <a
                href="${escapeHtml(link)}"
                target="_blank"
                rel="noopener noreferrer"
                class="text-primary font-semibold hover:underline"
              >
                Open Material
              </a>
            </div>
          </div>
        </article>
      `;
    }

    function renderMaterials(materials) {
      const container = document.getElementById("materialsContainer");

      if (!Array.isArray(materials) || materials.length === 0) {
        container.innerHTML = `
          <div class="col-span-full bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 p-8 text-center text-slate-500 dark:text-slate-400">
            No materials available.
          </div>
        `;
        return;
      }

      container.innerHTML = materials.map(createMaterialCard).join("");
    }

    function applyFilters() {
      const searchValue = document.getElementById("searchInput").value.trim().toLowerCase();
      const moduleValue = document.getElementById("moduleFilter").value;
      const typeValue = document.getElementById("typeFilter").value;

      const filtered = allMaterials.filter(material => {
        const matchesSearch =
          !searchValue ||
          String(material.title || "").toLowerCase().includes(searchValue) ||
          String(material.module_name || "").toLowerCase().includes(searchValue) ||
          String(material.material_type_name || "").toLowerCase().includes(searchValue);

        const matchesModule =
          !moduleValue || String(material.module_id) === String(moduleValue);

        const matchesType =
          !typeValue || String(material.material_type_id) === String(typeValue);

        return matchesSearch && matchesModule && matchesType;
      });

      renderMaterials(filtered);
    }

    async function loadModules() {
      const select = document.getElementById("moduleFilter");
      const shareSelect = document.getElementById("shareModule");

      try {
        const result = await API.modules.getAll();
        const modules = Array.isArray(result?.modules) ? result.modules : [];

        allModules = modules;

        select.innerHTML = `<option value="">All Modules</option>`;

        modules.forEach(module => {
          const option = document.createElement("option");
          option.value = module.module_id;
          option.textContent = `${module.module_code} - ${module.module_name}`;
          if (currentModuleId && String(module.module_id) === String(currentModuleId)) {
            option.selected = true;
          }
          select.appendChild(option);
        });

        if (shareSelect) {
          shareSelect.innerHTML = `<option value="">Select a module</option>`;
          modules.forEach(module => {
            const option = document.createElement("option");
            option.value = module.module_id;
            option.textContent = `${module.module_code} - ${module.module_name}`;
            if (currentModuleId && String(module.module_id) === String(currentModuleId)) {
              option.selected = true;
            }
            shareSelect.appendChild(option);
          });
        }
      } catch (error) {
        console.error("Failed to load modules:", error);
      }
    }


    async function loadMaterialTypes() {
      const select = document.getElementById("typeFilter");
      const shareTypeSelect = document.getElementById("shareType");

      try {
        const result = await API.materialTypes.getAll();
        const types = Array.isArray(result?.materialTypes) ? result.materialTypes : [];

        allTypes = types;

        select.innerHTML = `<option value="">All Types</option>`;
        if (shareTypeSelect) {
          shareTypeSelect.innerHTML = `<option value="">Select a type</option>`;
        }

        types.forEach(type => {
          const option = document.createElement("option");
          option.value = type.material_type_id;
          option.textContent = type.name;
          select.appendChild(option);

          if (shareTypeSelect) {
            const shareOption = document.createElement("option");
            shareOption.value = type.material_type_id;
            shareOption.textContent = type.name;
            shareOption.setAttribute("data-name", type.name);
            shareTypeSelect.appendChild(shareOption);
          }
        });
      } catch (error) {
        console.error("Failed to load material types:", error);
      }
    }
    
    async function loadMaterials() {
      const loading = document.getElementById("materialsLoading");
      loading.classList.remove("hidden");

      try {
        const selectedModuleId = document.getElementById("moduleFilter").value || currentModuleId || "";
        const selectedTypeId = document.getElementById("typeFilter").value || "";

        const studentResult = await API.studyMaterials.getAll(
          selectedModuleId || null,
          selectedTypeId || null
        );

        const studentMats = (studentResult.ok && Array.isArray(studentResult.materials))
          ? studentResult.materials.map(m => ({ ...m, _source: "student" }))
          : [];

        allMaterials = studentMats.sort(
          (a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)
        );

        loading.classList.add("hidden");
        renderMaterials(allMaterials);
      } catch (error) {
        console.error("Error loading materials", error);
        loading.classList.add("hidden");
        showPageStatus("Failed to load materials");
        renderMaterials([]);
      }
    }
    // ── Share modal logic ──────────────────────────────
    const LINK_TYPES = ["youtube", "external link"];

    function openShareModal() {
      const modal = document.getElementById("shareModal");
      const alertBox = document.getElementById("shareAlertBox");

      if (alertBox) alertBox.classList.add("hidden");

      document.getElementById("shareTitle").value = "";
      document.getElementById("shareDescription").value = "";
      document.getElementById("shareFile").value = "";
      document.getElementById("shareUrl").value = "";

      const modSelect = document.getElementById("shareModule");
      const typeSelect = document.getElementById("shareType");

      if (currentModuleId) {
        modSelect.value = String(currentModuleId);
      }

      if (typeSelect.options.length <= 1) {
        typeSelect.innerHTML = `<option value="">Select a type</option>`;
        allTypes.forEach(t => {
          const option = document.createElement("option");
          option.value = t.material_type_id;
          option.textContent = t.name;
          option.setAttribute("data-name", t.name);
          typeSelect.appendChild(option);
        });
      }

      updateShareFieldVisibility();
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }


    function closeShareModal() {
      const modal = document.getElementById("shareModal");
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    function updateShareFieldVisibility() {
      const typeSelect = document.getElementById("shareType");
      const selected = typeSelect.options[typeSelect.selectedIndex];
      const typeName = (selected && selected.getAttribute("data-name") || "").toLowerCase().trim();

      const fileGroup = document.getElementById("shareFileGroup");
      const linkGroup = document.getElementById("shareLinkGroup");

      if (LINK_TYPES.includes(typeName)) {
        fileGroup.classList.add("hidden");
        linkGroup.classList.remove("hidden");
      } else {
        fileGroup.classList.remove("hidden");
        linkGroup.classList.add("hidden");
      }
    }

    function showShareAlert(msg, type) {
      if (type === "success" && typeof showSuccessNotification === "function") {
        showSuccessNotification(msg);
      } else if (typeof showErrorNotification === "function") {
        showErrorNotification(msg);
      }

      const box = document.getElementById("shareAlertBox");
      box.classList.remove("hidden");
      box.className = type === "success"
        ? "mb-4 rounded-xl px-4 py-2.5 text-sm font-medium bg-green-100 text-green-700 border border-green-200"
        : "mb-4 rounded-xl px-4 py-2.5 text-sm font-medium bg-red-100 text-red-700 border border-red-200";
      box.textContent = msg;
    }

    async function submitShare() {
      const title = document.getElementById("shareTitle").value.trim();
      const description = document.getElementById("shareDescription").value.trim();
      const moduleId = document.getElementById("shareModule").value;
      const typeSelect = document.getElementById("shareType");
      const materialTypeId = typeSelect.value;
      const selected = typeSelect.options[typeSelect.selectedIndex];
      const typeName = (selected && selected.getAttribute("data-name") || "").toLowerCase().trim();
      const fileInput = document.getElementById("shareFile");
      const urlInput = document.getElementById("shareUrl");
      const btn = document.getElementById("shareSubmitBtn");

      if (!title || !moduleId || !materialTypeId) {
        showShareAlert("Title, module and type are required.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Uploading...";

      try {
        const formData = new FormData();
        formData.append("module_id", moduleId);
        formData.append("material_type_id", materialTypeId);
        formData.append("title", title);
        if (description) formData.append("description", description);

        if (LINK_TYPES.includes(typeName)) {
          const url = urlInput.value.trim();
          if (!url) { showShareAlert("Please enter a URL.", "error"); btn.disabled = false; btn.textContent = "Upload"; return; }
          formData.append("external_url", url);
        } else {
          if (!fileInput.files.length) { showShareAlert("Please select a file.", "error"); btn.disabled = false; btn.textContent = "Upload"; return; }
          formData.append("file", fileInput.files[0]);
        }

        const token = localStorage.getItem("token");
        const res = await fetch(backendBaseUrl + "/api/study-materials", {
          method: "POST",
          headers: { Authorization: "Bearer " + token },
          body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Upload failed");

        showShareAlert("Material shared successfully!", "success");
        setTimeout(async () => {
          closeShareModal();
          await loadMaterials();
          applyFilters();
        }, 800);
      } catch (err) {
        showShareAlert(err.message || "Failed to share material", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Upload";
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      initBackendBaseUrl();

    currentModuleId = getModuleIdFromQuery();
if (currentModuleId) {
  sessionStorage.setItem("selectedStudentModuleId", currentModuleId);
  sessionStorage.setItem("selectedModuleId", currentModuleId);
}


      const user = await requireAuth("student");
      if (!user) return;

      const logoutBtn = document.getElementById("shellLogoutBtn") || document.getElementById("logoutBtn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
          API.auth.logout();
        });
      }

      document.getElementById("searchInput").addEventListener("input", applyFilters);
      document.getElementById("moduleFilter").addEventListener("change", async () => {
        await loadMaterials();
        applyFilters();
      });

      document.getElementById("typeFilter").addEventListener("change", async () => {
        await loadMaterials();
        applyFilters();
      });

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        await loadModules();
        await loadMaterialTypes();
        await loadMaterials();
        applyFilters();
      });

      // Share modal events
      document.getElementById("shareMaterialBtn").addEventListener("click", openShareModal);
      document.getElementById("shareCancelBtn").addEventListener("click", closeShareModal);
      document.getElementById("shareSubmitBtn").addEventListener("click", submitShare);
      document.getElementById("shareType").addEventListener("change", updateShareFieldVisibility);
      document.getElementById("shareModal").addEventListener("click", function(e) {
        if (e.target === e.currentTarget) closeShareModal();
      });

      await loadModules();
      await loadMaterialTypes();
      await loadMaterials();
      applyFilters();
    });
  </script>
</body>
</html>
