<!DOCTYPE html>
<html class="light" lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password | DentaNet LMS</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

<link href="public/css/styles.css" rel="stylesheet"/>
<link href="assets/css/common.css" rel="stylesheet"/>

<script src="assets/js/common.js"></script>
<script src="assets/js/api.js"></script>

</head>

<body class="font-body bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200">

<main class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-lg glass-card rounded-2xl p-8 shadow-2xl">

<div class="text-center mb-8">

<img src="purple-logo.svg"
class="h-24 w-auto mx-auto mb-4"/>

<h1 class="text-3xl font-bold">
Reset Password
</h1>

<p class="text-slate-600 dark:text-slate-400 text-sm">
Enter your registered email to receive an OTP.
</p>

</div>

<form id="resetForm" class="space-y-6">

<!-- EMAIL STEP -->

<div id="emailStep">

<label class="block text-sm font-semibold mb-2">
Email Address
</label>

<input
id="email"
type="email"
placeholder="your.email@dentanet.lk"
class="w-full px-4 py-3 rounded-xl border"
/>

<button
class="w-full bg-primary text-white py-4 rounded-xl mt-6 font-semibold"
type="submit">

Send OTP

</button>

</div>

<!-- RESET STEP -->

<div id="resetStep" class="hidden">

<p class="text-sm text-blue-700 mb-4">

OTP valid for
<span id="countdown" class="font-bold">05:00</span>

</p>

<input
id="otp"
maxlength="6"
placeholder="000000"
class="w-full px-4 py-3 rounded-xl border text-center text-xl"
/>

<input
id="newPassword"
type="password"
placeholder="New Password"
class="w-full px-4 py-3 rounded-xl border mt-4"
/>

<input
id="confirmPassword"
type="password"
placeholder="Confirm Password"
class="w-full px-4 py-3 rounded-xl border mt-4"
/>

<button
id="resetBtn"
type="button"
class="w-full bg-primary text-white py-4 rounded-xl mt-6 font-semibold">

Reset Password

</button>

<button
id="backBtn"
type="button"
class="w-full text-slate-600 mt-3">

← Back

</button>

</div>

</form>

</div>

</main>

<script>

let countdownInterval;
let userEmail = "";

document
.getElementById("resetForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const email =
document.getElementById("email")
.value.trim()
.toLowerCase();

if(!email){

showWarningNotification(
"Please enter your email"
);

return;
}

try{

const result =
await API.auth.forgotPassword(email);

if(!result.ok){

showErrorNotification(
result.error ||
"Failed to send OTP"
);

return;
}

userEmail = email;

localStorage.setItem(
"resetEmail",
email
);

document
.getElementById("emailStep")
.classList.add("hidden");

document
.getElementById("resetStep")
.classList.remove("hidden");

startCountdown(600);

showSuccessNotification(
"OTP sent successfully"
);

}catch(error){

console.error(error);

showErrorNotification(
"Failed to send OTP"
);

}

});

document
.getElementById("resetBtn")
.addEventListener("click", async function(){

const otp =
document.getElementById("otp").value.trim();

const newPassword =
document.getElementById("newPassword").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

const email =
userEmail ||
localStorage.getItem("resetEmail");

if(!otp || otp.length !== 6){

showWarningNotification(
"Enter valid 6-digit OTP"
);

return;
}

if(newPassword.length < 8){

showWarningNotification(
"Password must be at least 8 characters"
);

return;
}

if(newPassword !== confirmPassword){

showWarningNotification(
"Passwords do not match"
);

return;
}

try{

const result =
await API.auth.resetPassword(
email,
otp,
newPassword
);

if(!result.ok){

showErrorNotification(
result.error ||
"Reset failed"
);

return;
}

clearInterval(countdownInterval);

localStorage.removeItem("resetEmail");

showSuccessNotification(
"Password reset successful"
);

setTimeout(()=>{
window.location.href="login.html";
},1200);

}catch(error){

console.error(error);

showErrorNotification(
"Reset failed"
);

}

});

document
.getElementById("backBtn")
.addEventListener("click", function(){

document
.getElementById("resetStep")
.classList.add("hidden");

document
.getElementById("emailStep")
.classList.remove("hidden");

clearInterval(countdownInterval);

});

document
.getElementById("otp")
.addEventListener("input", function(){

this.value =
this.value.replace(/[^0-9]/g,"");

});

function startCountdown(seconds){

let remaining = seconds;

const el =
document.getElementById("countdown");

clearInterval(countdownInterval);

countdownInterval =
setInterval(()=>{

const mins =
Math.floor(remaining/60);

const secs =
remaining%60;

el.textContent =
`${mins}:${secs.toString().padStart(2,"0")}`;

if(remaining<=0){

clearInterval(countdownInterval);

showWarningNotification(
"OTP expired"
);

location.reload();

}

remaining--;

},1000);

}

</script>

</body>
</html>
