<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Reset Password | DentaNet LMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <link href="public/css/styles.css" rel="stylesheet"/>
    <script src="assets/js/api.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#7f13ec",
                        "background-light": "#faf5ff",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                        xl: "1.5rem",
                        "2xl": "2rem",
                    },
                },
            },
        };
    </script>
</head>
<body class="font-body bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 transition-colors duration-300">
    <nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <img src="purple-logo.svg" alt="DentaNet Logo" class="h-24 w-auto"/>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a class="text-sm font-medium hover:text-primary transition-colors" href="index.html">Home</a>
                    <a class="text-sm font-medium hover:text-primary transition-colors" href="index.html#about">About</a>
                    <a class="bg-primary hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-semibold transition-all shadow-md" href="login.html">Log In</a>
                    <button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
                        <span class="material-symbols-outlined block dark:hidden">dark_mode</span>
                        <span class="material-symbols-outlined hidden dark:block">light_mode</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-16 flex items-center justify-center dental-bg relative overflow-hidden">
        <div class="absolute inset-0 bg-blue-50/30 dark:bg-slate-900/40 backdrop-blur-[2px]"></div>
        <div class="relative z-10 w-full max-w-lg px-4">
            <div class="glass-card rounded-2xl p-8 md:p-12 shadow-2xl">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center gap-2 mb-6">
                        <img src="purple-logo.svg" alt="DentaNet Logo" class="h-24 w-auto rounded-lg shadow-md mx-auto"/>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-3">Reset Password</h1>
                    <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                        Enter your registered email to receive an OTP, then reset your password securely.
                    </p>
                </div>

                <form id="resetForm" class="space-y-6">
                    <!-- Step 1: Email -->
                    <div id="emailStep">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">Email Address</label>
                            <div class="relative">
                                <input
                                    class="w-full px-4 py-3 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none shadow-inner"
                                    id="email"
                                    name="email"
                                    placeholder="your.email@dentanet.lk"
                                    type="email"
                                    required
                                />
                            </div>
                        </div>

                        <button class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg hover:shadow-primary/30 transform hover:-translate-y-0.5 active:translate-y-0 mt-6" type="submit">
                            Send OTP
                        </button>
                    </div>

                    <!-- Step 2: OTP + New Password -->
                    <div id="resetStep" class="hidden">
                        <div class="mb-4 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl">
                            <p class="text-sm text-blue-700 dark:text-blue-300">
                                <span class="material-symbols-outlined text-base align-text-bottom">schedule</span>
                                OTP sent to your email. Valid for <span id="countdown" class="font-bold">05:00</span> minutes.
                            </p>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="otp">Enter OTP</label>
                            <input
                                class="w-full px-4 py-3 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none shadow-inner text-center text-2xl tracking-widest font-mono"
                                id="otp"
                                maxlength="6"
                                placeholder="000000"
                                type="text"
                            />
                        </div>

                        <div class="mt-4">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="newPassword">New Password</label>
                            <input
                                class="w-full px-4 py-3 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none shadow-inner"
                                id="newPassword"
                                type="password"
                                placeholder="Enter new password"
                            />
                        </div>

                        <div class="mt-4">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="confirmPassword">Confirm Password</label>
                            <input
                                class="w-full px-4 py-3 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none shadow-inner"
                                id="confirmPassword"
                                type="password"
                                placeholder="Confirm new password"
                            />
                        </div>

                        <button id="resetBtn" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg hover:shadow-primary/30 transform hover:-translate-y-0.5 active:translate-y-0 mt-6" type="button">
                            Reset Password
                        </button>

                        <button id="backBtn" class="w-full text-slate-600 dark:text-slate-400 font-semibold py-2 hover:text-primary transition-all" type="button">
                            ← Back
                        </button>
                    </div>
                </form>

                <div class="mt-10 text-center">
                    <p class="text-sm text-slate-600 dark:text-slate-400">
                        Remember your password?
                        <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="login.html">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let countdownInterval;
        let userEmail = "";

        document.getElementById("resetForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim().toLowerCase();
            userEmail = email;

            if (!email) {
                alert("Please enter your email");
                return;
            }

            try {
                const result = await API.auth.forgotPassword(email);

                if (!result.ok) {
                    alert(result.error || "Failed to send OTP");
                    return;
                }

                localStorage.setItem("resetEmail", email);

                document.getElementById("emailStep").classList.add("hidden");
                document.getElementById("resetStep").classList.remove("hidden");

                startCountdown(600);
                alert("OTP sent to your email. Please check your inbox.");
            } catch (error) {
                console.error("Forgot password error:", error);
                alert("Failed to send OTP. Please try again.");
            }
        });

        document.getElementById("resetBtn").addEventListener("click", async function () {
            const otp = document.getElementById("otp").value.trim();
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const email = userEmail || localStorage.getItem("resetEmail");

            if (!otp || otp.length !== 6) {
                alert("Please enter a valid 6-digit OTP");
                return;
            }

            if (!newPassword || newPassword.length < 6) {
                alert("Password must be at least 6 characters long");
                return;
            }

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            try {
                const result = await API.auth.resetPassword(email, otp, newPassword);

                if (!result.ok) {
                    alert(result.error || "Failed to reset password");
                    return;
                }

                clearInterval(countdownInterval);
                localStorage.removeItem("resetEmail");

                alert("Password reset successfully! You can now login with your new password.");
                window.location.href = "login.html";
            } catch (error) {
                console.error("Reset password error:", error);
                alert("Failed to reset password. Please try again.");
            }
        });

        document.getElementById("backBtn").addEventListener("click", function () {
            document.getElementById("resetStep").classList.add("hidden");
            document.getElementById("emailStep").classList.remove("hidden");
            document.getElementById("otp").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmPassword").value = "";
            clearInterval(countdownInterval);
        });

        document.getElementById("otp").addEventListener("input", function () {
            this.value = this.value.replace(/[^0-9]/g, "");
        });

        function startCountdown(seconds) {
            let remaining = seconds;
            const countdownEl = document.getElementById("countdown");

            clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                countdownEl.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;

                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    alert("OTP expired. Please request a new one.");
                    window.location.reload();
                }

                remaining--;
            }, 1000);
        }
    </script>
</body>
</html>
